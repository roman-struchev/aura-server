spring.application.name=aura-server
spring.threads.virtual.enabled=true

# Actuator
management.endpoints.web.exposure.include=metrics,prometheus

# Trust X-Forwarded-* headers from the reverse proxy in front of this server,
# so share links are generated with the public https:// host/domain instead
# of this process's own scheme/port.
server.forward-headers-strategy=framework

# Work Together (collaborative editing) backend settings.
# HMAC secret used to sign session/link tokens. If left blank, a random secret
# is generated at startup (logged as a warning) — fine for a single instance,
# but it means all outstanding tokens/links become invalid on every restart.
# Set a stable value via the WORKTOGETHER_TOKEN_SECRET env var for production.
worktogether.token-secret=${WORKTOGETHER_TOKEN_SECRET:}
# Ceiling applied when a session doesn't specify maxTtlSeconds, and hard cap
# regardless of what a client requests.
worktogether.max-session-ttl-seconds=604800
# How often the in-memory store sweeps for expired sessions/links/connections.
worktogether.cleanup-interval-seconds=15
