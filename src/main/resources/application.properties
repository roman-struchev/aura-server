spring.application.name=aura-server
spring.threads.virtual.enabled=true

# Actuator
management.endpoints.web.exposure.include=metrics,prometheus

# Trust X-Forwarded-* headers from the reverse proxy in front of this server.
server.forward-headers-strategy=framework

# Response Compression (Gzip)
server.compression.enabled=true
server.compression.min-response-size=2048
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml

# Static Resources Caching (14 days with Cache-Busting Resource Chain)
spring.web.resources.cache.cachecontrol.max-age=14d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Work Together (collaborative editing) backend settings.
# Public URL guests should use to reach this server, e.g. https://aura.struchev.site.
# Leave blank (the default) to derive it per-request instead, from the
# Host/X-Forwarded-* headers the reverse proxy sets (see
# server.forward-headers-strategy below) — only pin this explicitly if
# requests can otherwise arrive through more than one address (e.g. an
# internal Docker hostname bypassing the proxy) and share links must always
# point at one specific public host regardless of how the request came in.
worktogether.public-base-url=${WORKTOGETHER_PUBLIC_BASE_URL:}
# HMAC secret used to sign session/link tokens. If left blank, a random secret
# is generated at startup (logged as a warning) — fine for a single instance,
# but it means all outstanding tokens/links become invalid on every restart.
# Set a stable value via the WORKTOGETHER_TOKEN_SECRET env var for production.
worktogether.token-secret=${WORKTOGETHER_TOKEN_SECRET:}
# Ceiling applied when a session doesn't specify maxTtlSeconds, and hard cap
# regardless of what a client requests. Matches AuraPad's own MAX_TTL_SECONDS
# (src/renderer/src/hooks/useWorkTogether.ts in aura-pad) - keep these two in
# sync, since a lower value here just means AuraPad's create-session call
# gets rejected with a 422.
worktogether.max-session-ttl-seconds=2592000
# How often the in-memory store sweeps for expired sessions/links/connections.
worktogether.cleanup-interval-seconds=30
