<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__FILE_PATH_HTML__ — Work Together</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/work-together/app.css" />
  <style>
    /* Fallback in case app.css hasn't loaded yet - avoids a flash of unstyled content. */
    html, body { margin: 0; padding: 0; background: #1e1e1e; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Every value below is injected by the server as a self-quoting JSON
    // literal (never bare string interpolation) to stay safe regardless of
    // what a Host put in filePath/language/content when creating the session.
    window.__WORK_TOGETHER__ = {
      sessionId: __SESSION_ID_JSON__,
      token: __TOKEN_JSON__,
      role: __ROLE_JSON__,
      language: __LANGUAGE_JSON__,
      filePath: __FILE_PATH_JSON__,
      initialContent: __INITIAL_CONTENT_JSON__
    };
  </script>

  <script src="/work-together/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: '/work-together/vs' } });
    require(['vs/editor/editor.main'], function () {
      // Monaco is now available as window.monaco. Load the bundled app
      // logic (Yjs / y-websocket / y-monaco wiring + UI) now.
      var s = document.createElement('script');
      s.src = '/work-together/app.js';
      document.body.appendChild(s);
    });
  </script>
</body>
</html>
